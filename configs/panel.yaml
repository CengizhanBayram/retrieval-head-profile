# Quantized rings used only by the inheritance chains (E10–E14). The loader
# reads `quant` to pick AWQ/GPTQ; otherwise it falls back to 8-bit.
quant_models:
  qwen25_7b_instruct_awq4:
    hf_id: "Qwen/Qwen2.5-7B-Instruct-AWQ"
    quant: "awq4"
    theta: 1000000
    n_layers: 28
    n_heads: 28
    head_dim: 128
    license: "apache-2.0"
    family: "qwen"
  qwen25_7b_instruct_gptq4:
    hf_id: "Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4"
    quant: "gptq4"
    theta: 1000000
    n_layers: 28
    n_heads: 28
    head_dim: 128
    license: "apache-2.0"
    family: "qwen"

# ---------------------------------------------------------------------------
# Inheritance lineages (proposal §3.4). Each is an ORDERED chain of rings; the
# inheritance package measures every adjacent ring-pair.
# ---------------------------------------------------------------------------
lineages:
  qwen:
    description: "Qwen2.5-7B: base → instruct → 4-bit (AWQ/GPTQ); 3B sibling for distillation contrast."
    chain: ["qwen25_7b", "qwen25_7b_instruct", "qwen25_7b_instruct_awq4", "qwen25_7b_instruct_gptq4"]
    sibling: "qwen25_3b_instruct"
  llama:
    description: "Llama-3.1-8B: base → instruct → 4-bit quantized."
    chain: ["llama31_8b", "llama31_8b_instruct"]
  gemma:
    description: "Gemma-2-9B: pt → it; Gemma-2-2B is the reported distillation sibling."
    chain: ["gemma2_9b", "gemma2_9b_it"]
    sibling: "gemma2_2b"
  mistral:
    description: "Mistral-7B v0.3: base → instruct."
    chain: ["mistral7b_v03", "mistral7b_v03_instruct"]

# ---------------------------------------------------------------------------
# NIAH / profile / behavioural hyperparameters. Mirrors the Part-1 `niah`
# block; values reflect proposal §3.3 and Block A/B specs.
# ---------------------------------------------------------------------------
niah:
  context_lengths: [1024, 2048, 4096]
  context_lengths_small: [1024, 2048, 4096, 8192, 16384]   # used for ≤3B models (E6)
  needle_positions: [0.1, 0.25, 0.5, 0.75, 0.9]
  n_samples: 200                 # profile sample budget; R6 sweeps 100 vs 200
  score_threshold: 0.1           # R1 sweeps τ ∈ {0.05, 0.1, 0.2, 0.3}
  threshold_sweep: [0.05, 0.1, 0.2, 0.3]
  seeds: [42, 123, 2024]

profile:
  # Frequency-signature sweep (E2): k = head_dim/8 window, 8 spectral positions.
  freq_window_divisor: 8
  freq_n_windows: 8
  coverage: 0.5                  # fraction of retrieval heads patched (R3: 0.3/0.5/1.0)
  top_k_heads: 30                # cap the patched population for VRAM/time
  knockout_random_seeds: [0, 1, 2, 3, 4]

activation_patching:
  k_dims: 16

ruler:
  # E7 subset; keep small and defensible (proposal §3.3).
  tasks: ["multikey", "multivalue", "vartrack"]
  context_lengths: [2048, 4096]
  n_samples: 100
  seeds: [42, 123]
  multikey_n_keys: 4
  multivalue_n_values: 3
  vartrack_chain_len: 4

output:
  results_dir: "./results"
  figures_dpi: 300
  figure_format: "pdf"

reproducibility:
  strict_determinism: false

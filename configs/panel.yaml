# Quantized rings used only by the inheritance chains (E10–E14). `quant` drives
# rhp.loader.load_model_any: "awq4"/"gptq4" load a pre-quantized repo, "bnb4"
# applies bitsandbytes NF4 load-time 4-bit to the instruct weights (no separate
# repo needed — the proposal's §3.4 "→ 4-bit quantized" rings for Llama/Gemma).
quant_models:
  # qwen bnb4 — the 3rd 4-bit method (alongside llama/gemma bnb4). Works on the
  # current torch/transformers stack; gives a clean 3-family within-method
  # (bnb NF4) quant-inheritance result. In the active qwen chain below.
  qwen25_7b_instruct_bnb4:
    hf_id: "Qwen/Qwen2.5-7B-Instruct"
    quant: "bnb4"
    theta: 1000000
    n_layers: 28
    n_heads: 28
    head_dim: 128
    license: "apache-2.0"
    family: "qwen"
  # AWQ/GPTQ — DIFFERENT quant methods (activation-aware / Hessian-error-min) that
  # may preserve retrieval/frequency channels differently than bnb4 (E14 cross-
  # method comparison). NOT loadable on the pinned torch 2.11/cu128 + transformers
  # 4.47 stack (autoawq needs tf>=4.51 + missing kernels; gptq needs optimum/
  # auto-gptq which won't build). Produced separately by notebook 12 on a pinned
  # compatible stack (tf 4.51 + gptqmodel/autoawq); kept here for that run.
  qwen25_7b_instruct_awq4:
    hf_id: "Qwen/Qwen2.5-7B-Instruct-AWQ"
    quant: "awq4"
    theta: 1000000
    n_layers: 28
    n_heads: 28
    head_dim: 128
    license: "apache-2.0"
    family: "qwen"
  qwen25_7b_instruct_gptq4:
    hf_id: "Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4"
    quant: "gptq4"
    theta: 1000000
    n_layers: 28
    n_heads: 28
    head_dim: 128
    license: "apache-2.0"
    family: "qwen"
  llama31_8b_instruct_bnb4:
    hf_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
    quant: "bnb4"
    theta: 500000
    n_layers: 32
    n_heads: 32
    head_dim: 128
    license: "llama3.1"
    family: "llama"
  gemma2_9b_it_bnb4:
    hf_id: "google/gemma-2-9b-it"
    quant: "bnb4"
    theta: 10000
    n_layers: 42
    n_heads: 16
    head_dim: 256
    license: "gemma"
    family: "gemma"
    gpu: "a100"          # 256-dim KV is fp16 regardless of 4-bit weights → A100

# ---------------------------------------------------------------------------
# Inheritance lineages (proposal §3.4). Each is an ORDERED chain of rings; the
# inheritance package measures every adjacent ring-pair.
# ---------------------------------------------------------------------------
lineages:
  qwen:
    description: "Qwen2.5-7B: base → instruct → 4-bit (bnb NF4); 3B sibling for distillation contrast. AWQ/GPTQ measured separately (notebook 12) as the E14 cross-method comparison."
    chain: ["qwen25_7b", "qwen25_7b_instruct", "qwen25_7b_instruct_bnb4"]
    sibling: "qwen25_3b_instruct"
  llama:
    description: "Llama-3.1-8B: base → instruct → 4-bit (bnb NF4)."
    chain: ["llama31_8b", "llama31_8b_instruct", "llama31_8b_instruct_bnb4"]
  gemma:
    description: "Gemma-2-9B: pt → it → 4-bit (bnb NF4); Gemma-2-2B is the reported distillation sibling."
    chain: ["gemma2_9b", "gemma2_9b_it", "gemma2_9b_it_bnb4"]
    sibling: "gemma2_2b"
  mistral:
    description: "Mistral-7B v0.3: base → instruct."
    chain: ["mistral7b_v03", "mistral7b_v03_instruct"]

# ---------------------------------------------------------------------------
# NIAH / profile / behavioural hyperparameters. Mirrors the Part-1 `niah`
# block; values reflect proposal §3.3 and Block A/B specs.
# ---------------------------------------------------------------------------
# `niah` drives the PROFILE detector (E1–E3): heads are detected at a single
# context (4096; see run_profile_for_model). These positions + sample budget are
# what the two detectors and the knockout use.
niah:
  context_lengths: [1024, 2048, 4096]      # legacy; profile detection uses 4096
  needle_positions: [0.1, 0.25, 0.5, 0.75, 0.9]
  n_samples: 200                 # profile sample budget; R6 sweeps 100 vs 200
  score_threshold: 0.1           # R1 sweeps τ ∈ {0.05, 0.1, 0.2, 0.3}
  threshold_sweep: [0.05, 0.1, 0.2, 0.3]
  seeds: [42, 123, 2024]

# `behavior` drives the E6 long-context NIAH sweep — the RQ2 target. The pilot
# showed plain NIAH saturates at ≤4096 (every model 1.0 → zero variance), so the
# sweep runs at LONG context where models actually differ (OLMo-2 is 4k-native →
# fails by 16k; Llama-3.1 is 128k-native → holds). Per-context sample counts
# DECREASE with length to keep one model ≈5 h (24 h-safe chunking). An OOM at the
# longest length is caught and stored as NaN — itself informative (the model
# cannot reach that length). `niah_long` (mean over contexts ≥ the threshold) is
# the primary RQ2 target; `ruler_multivalue`/`ruler_vartrack` are the others.
behavior:
  context_schedule:
    4096: 60
    8192: 36
    16384: 20
    32768: 10
  needle_positions: [0.1, 0.5, 0.9]
  long_context_threshold: 16384
  # --- optional HIGH / stress variant (experiment; ~2× cost — watch the 24 h
  #     budget; re-chunk behaviour notebooks smaller). Swap the two keys above for:
  # context_schedule: {8192: 60, 16384: 40, 32768: 24, 65536: 12}
  # needle_positions: [0.1, 0.25, 0.5, 0.75, 0.9]

profile:
  # Frequency-signature sweep (E2): k = head_dim/8 window, 8 spectral positions.
  freq_window_divisor: 8
  freq_n_windows: 8
  coverage: 0.5                  # fraction of retrieval heads patched (R3: 0.3/0.5/1.0)
  top_k_heads: 30                # cap the patched population for VRAM/time
  knockout_random_seeds: [0, 1, 2, 3, 4]

activation_patching:
  k_dims: 16

ruler:
  # E7 subset; harder + longer than the proposal minimum so the tasks don't
  # saturate (the pilot showed multikey near-ceiling at 4 keys / 4k). multivalue
  # and vartrack already discriminate; the longer context spreads multikey too.
  tasks: ["multikey", "multivalue", "vartrack"]
  context_lengths: [4096, 8192]
  n_samples: 60
  seeds: [42, 123]
  multikey_n_keys: 6
  multivalue_n_values: 4
  vartrack_chain_len: 6

output:
  results_dir: "./results"
  figures_dpi: 300
  figure_format: "pdf"

reproducibility:
  strict_determinism: false

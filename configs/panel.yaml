# ===========================================================================
# Retrieval-Head Profile — model panel and inheritance lineages.
#
# Selection principles (proposal §3.2):
#   • 3–9 B range (fits 24 GB in 8-bit), open license, pinnable HF revision,
#     architecture/family diversity.
#   • Each entry mirrors the Part-1 config schema (hf_id, revision, theta,
#     n_layers, n_heads, head_dim, load_in_8bit, license) so the inherited
#     src/model_loader.load_model() consumes it unchanged.
#
# REVISIONS ARE UNPINNED ("main") ON PURPOSE in this template. Before the
# reportable run, replace each with an exact commit SHA (the loader warns while
# a revision is "main"). Pre-screening (≈2–4 GPU-h/model) finalises the list.
#
# `tier`: core | panel.  The 5 "core" models get 3 seeds and test-retest (E9);
#         the rest get a single seed (proposal §5 / R5).
# `quant`: only set on quantized rings (e.g. awq4 / gptq4) — drives the loader.
#
# PANEL SIZE: 18 base/instruct models below (8 families: llama, qwen, gemma,
# mistral, olmo, phi, falcon, stablelm) + 2 quantized rings = 20 pinnable
# entries. This is exactly the proposal §3.2 draft panel: 12 base families + 6
# instruct/it derivatives that also serve the lineage chains (§3.4). All sit
# ≤9 B so each loads alone in 8-bit on a 24 GB GPU. If §7's "18 points few"
# statistical-power risk bites, the panel can be expanded (the proposal leaves
# that path open); if the §4 budget bites, trim to the 14-model core.
# ===========================================================================

